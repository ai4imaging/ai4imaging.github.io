<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <!-- 1. 告诉搜索引擎这个页面的永久转移地址 -->
    <link rel="canonical" href="https://hesunpu.github.io/index_zh.html">
    <!-- 2. Meta 刷新重定向：0秒后跳转 -->
    <meta http-equiv="refresh" content="0; url=https://hesunpu.github.io/index_zh.html">
    <!-- 3. JavaScript 辅助跳转（更快） -->
    <script type="text/javascript">
      window.location.href = "https://hesunpu.github.io/index_zh.html";
    </script>
  </head>
  <body>
    <p>正在跳转，如果没有自动跳转，请点击 <a href="https://hesunpu.github.io/index_zh.html">这里</a>。</p>
  </body>
</html>
